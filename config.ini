# PaperSearch Configuration File

# SciHub Mirror Sites
# Add or remove SciHub mirror URLs as needed
[scihub]
mirrors = [
    "https://sci-hub.st/"
]

# PDF Download Settings
[pdf_download]
max_workers = 20
timeout = 300
download_delay = 1  # Delay in seconds between SciHub downloads

# Export Settings
[export]
default_output_dir = "D:\\"
